services:
  - type: web
    name: sayet-server
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sayet-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://sayet-client.onrender.com

  - type: web
    name: sayet-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://sayet-server.onrender.com

databases:
  - name: sayet-db
    plan: starter
    databaseName: sayet
    user: sayet
